name: Bug Report
description: Report a bug in the project
title: "[BUG] "
labels:
  - type:bug
body:
  - type: markdown
    attributes:
      value: |
        Use labels with the prefix system:
        - type:bug 
        - area:bdi or area:llm 
        - priority:low or priority:medium or priority:high

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - bdi
        - llm
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - low
        - medium
        - high
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
